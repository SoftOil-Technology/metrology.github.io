name: CI/CD Astro Pro (Manual & Auto)

on:
  push:
    branches: [ "main", "dev" ]
  # Permite la ejecución manual
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Tag manual (ej: V1.5.0). Si se deja vacío, se calculará automáticamente.'
        required: false
        default: ''
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Instalar pnpm primero
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # O la versión que uses localmente

      # 2. Configurar Node con cache de pnpm
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # <--- Ahora sí encontrará el pnpm-lock.yaml

      # 3. Usar comandos de pnpm
      - run: pnpm install
      - run: pnpm astro check
      - run: pnpm build

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 1. Generar Tag Automático (solo si NO se provee uno manual)
      - name: Bump version and push tag
        if: github.event.inputs.manual_tag == ''
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ github.ref == 'refs/heads/main' && 'major' || 'minor' }}

      # 2. Determinar qué TAG usar (Manual o Automático)
      - name: Final Tag Selection
        id: select_tag
        run: |
          if [ "${{ github.event.inputs.manual_tag }}" != "" ]; then
            echo "final_tag=${{ github.event.inputs.manual_tag }}" >> $GITHUB_OUTPUT
          else
            echo "final_tag=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
          fi

      # 3. Login a Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Construir y subir imagen
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/astro-project:${{ steps.select_tag.outputs.final_tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/astro-project:latest', secrets.DOCKERHUB_USERNAME) || '' }}

      # 5. Crear el GitHub Release (Solo en Main o si se puso tag manual en Main)
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.select_tag.outputs.final_tag }}
          name: Release ${{ steps.select_tag.outputs.final_tag }}
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
